plugins {
    id 'java-library'
}

repositories {
    mavenCentral();
}

dependencies {
    implementation 'com.acmerobotics.roadrunner:core:1.0.1'
    implementation 'com.noahbres.meepmeep:MeepMeep:2.0.3'
}
java {
    sourceCompatibility JavaVersion.VERSION_11
    targetCompatibility JavaVersion.VERSION_11
}